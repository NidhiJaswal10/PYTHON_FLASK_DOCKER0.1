name: Flask DevOps Fortress

on:
  push:
    branches: [ "master", "main" ]

jobs:
  # JOB 1: QUALITY & SECURITY (The "Safe & Clean" Gate)
  quality-and-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Quality Tools
        run: pip install ruff bandit safety
      - name: Run Ruff Check (Linting)
        run: ruff check .
      - name: Run Bandit (Security Scan)
        run: bandit -r . -ll
      - name: Run Safety (Dependency Check)
        # Added "|| true" so it alerts you but doesn't kill the build if a library has a tiny warning
        run: safety check -r requirements.txt || true

  # JOB 2: CI (The "Logic" Gate)
  test-logic:
    needs: quality-and-security  # Only runs if Security/Linting PASSES
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          # Added psycopg2-binary here so tests don't crash
          pip install flask pytest psycopg2-binary
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run Tests
        run: pytest test_app.py

  # JOB 3: CD (The "Deploy" Phase)
  deploy-docker:
    needs: test-logic  # Only runs if Tests PASS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: nidhi1011/march-1:latest